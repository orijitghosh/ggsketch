url: https://orijitghosh.github.io/ggsketch/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    base_font: {google: "Karla"}
    heading_font: {google: "Caveat"}
    code_font: {google: "JetBrains Mono"}
    primary: "#7BAFD4"
    border-radius: 0.5rem
    btn-border-radius: 0.5rem
  opengraph:
    image:
      src: man/figures/README-hero.png
      alt: "Sketchy hachure-filled violin plots of highway mpg by vehicle class"

home:
  title: "ggsketch — hand-drawn geoms for ggplot2"
  description: >
    Grammar-native, hand-drawn (rough.js style) geoms for ggplot2, in pure R.

reference:
  - title: Package
    contents:
      - ggsketch-package
  - title: Lines & points
    desc: Sketchy paths, connected lines, and roughened-marker scatter points.
    contents:
      - geom_sketch_line
      - geom_sketch_path
      - geom_sketch_point
      - geom_sketch_jitter
      - geom_sketch_count
      - geom_sketch_function
      - geom_sketch_rug
  - title: Bars, tiles & rectangles
    desc: The signature filled look — roughened outlines with hachure-style fills.
    contents:
      - geom_sketch_col
      - geom_sketch_rect
      - geom_sketch_lollipop
  - title: Comparisons & change
    desc: Paired and ranked values — gaps, before/after, and rate of change.
    contents:
      - geom_sketch_dumbbell
      - geom_sketch_slope
  - title: Distributions
    contents:
      - geom_sketch_histogram
      - geom_sketch_density
      - geom_sketch_ridgeline
      - geom_sketch_dotplot
      - geom_sketch_ecdf
      - geom_sketch_violin
      - geom_sketch_boxplot
      - geom_sketch_beeswarm
      - geom_sketch_bin2d
      - geom_sketch_hex
  - title: Contours & 2-D density
    contents:
      - geom_sketch_contour
      - geom_sketch_density2d
      - geom_sketch_contour_filled
  - title: Engraving & tonal shading
    desc: >
      Continuous tone built from hatch-line density (etching / banknote style),
      computed from geometry rather than tiled from a motif.
    contents:
      - geom_sketch_engrave
      - geom_sketch_shade
      - scale_tone_continuous
  - title: Models & quantiles
    contents:
      - geom_sketch_quantile
      - geom_sketch_qq
  - title: Areas, ribbons & curves
    contents:
      - geom_sketch_polygon
      - geom_sketch_ribbon
      - geom_sketch_streamgraph
      - geom_sketch_smooth
  - title: Intervals & uncertainty
    contents:
      - geom_sketch_linerange
  - title: Reference lines
    contents:
      - geom_sketch_abline
  - title: Circular & composed
    contents:
      - geom_sketch_circle
      - geom_sketch_segment
      - geom_sketch_curve
      - geom_sketch_spoke
  - title: Pie & donut charts
    desc: Hand-drawn part-to-whole charts that stay round on any panel shape.
    contents:
      - geom_sketch_pie
  - title: Part-to-whole
    desc: Square and nested part-to-whole charts.
    contents:
      - geom_sketch_waffle
      - geom_sketch_treemap
  - title: Calendar & time
    desc: Hand-drawn heatmaps over the calendar.
    contents:
      - geom_sketch_calendar
  - title: Networks
    desc: >
      Hand-drawn graphs - roughened nodes and edges, placed by a pure-R
      force-directed layout (no graph dependency required).
    contents:
      - geom_sketch_edge
      - sketch_graph
      - force_layout
  - title: Maps
    desc: >
      Hand-drawn simple-features (sf) maps - roughened polygon, line and point
      geometry in one call (plots in planar coordinates).
    contents:
      - geom_sketch_sf
  - title: Radar
    desc: Spider / radar charts - one roughened polygon per series over a web.
    contents:
      - geom_sketch_radar
  - title: Chord diagrams
    desc: Circular flow diagrams - nodes on a rim, ribbons through the centre.
    contents:
      - geom_sketch_chord
  - title: Alluvial & Sankey
    desc: Categorical axes joined by frequency-weighted flows.
    contents:
      - geom_sketch_alluvial
  - title: Parallel coordinates
    desc: Numeric axes crossed by one roughened polyline per observation.
    contents:
      - geom_sketch_parallel
  - title: Mosaic
    desc: Two categorical variables as area-proportional tiles.
    contents:
      - geom_sketch_mosaic
  - title: Motion
    desc: >
      Animate a sketch plot by re-seeding its wobble each frame - the
      hand-drawn "boiling line" effect.
    contents:
      - animate_sketch
  - title: Text, annotations, theme & fonts
    desc: >
      Handwriting text, the content-aware arrow / callout / hull-mark toolkit,
      one-off annotations, theming, and font helpers.
    contents:
      - geom_sketch_text
      - annotate_sketch
      - geom_sketch_bracket
      - geom_sketch_arrow
      - annotate_sketch_arrow
      - geom_sketch_callout
      - annotate_sketch_callout
      - geom_sketch_mark_hull
      - geom_sketch_mark_circle
      - theme_sketch
      - ggsketch_check_fonts
      - register_sketch_font
  - title: Drawing media
    desc: >
      The `medium` system — how a stroke is laid down (pen, ink, brush, pencil,
      charcoal, marker, crayon) — and its mappable scale.
    contents:
      - sketch_media
      - scale_medium_discrete
  - title: Paper & ground
    desc: >
      Drawing surfaces for `theme_sketch(paper = )` — ruled, gridded, aged,
      blueprint, chalkboard and kraft grounds rendered as vector textures.
    contents:
      - sketch_papers
      - element_sketch_paper
  - title: Sketch frame & colour scales
    desc: >
      Hand-drawn theme elements (gridlines, panel border, axis ticks) and a
      matching paper-and-ink colour palette.
    contents:
      - element_sketch_line
      - coord_sketch
      - coord_sketch_polar
      - scale_sketch
      - scale_roughness_continuous
      - sketch_palette
  - title: Legend keys
    desc: The sketchy `draw_key` functions wired into every geom.
    contents:
      - draw_key_sketch
  - title: Building blocks (grid grobs — Layer 2)
    desc: Lower-level grobs that re-roughen in device space inside `makeContent()`.
    contents:
      - sketch_path_grob
      - sketch_stroke_grob
      - sketch_polygon_grob
      - sketch_ellipse_grob
      - sketch_wedge_grob
      - sketch_arrow_grob
      - sketch_callout_grob
      - sketch_band_grob
      - sketch_engrave_grob
      - sketch_dotplot_grob
  - title: Core geometry (Layer 1 — pure, no grid/ggplot2)
    desc: The number-to-number routines that produce the hand-drawn coordinates.
    contents:
      - roughen_polyline
      - rough_ellipse
      - rough_arc
      - rough_bezier
      - hachure_fill
      - hachure_fill_multi
      - sketch_fill
      - sketch_fill_multi
      - engrave_fill
      - engrave_ladder
      - curve_fill
      - stroke_profile
      - stroke_ribbon
      - watercolor_wash
      - watercolor_wash_multi
      - treemap_layout
      - paper_spec
      - paper_primitives
  - title: internal
    contents:
      - GeomSketchNull
